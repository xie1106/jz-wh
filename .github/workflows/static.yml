# 简单的工作流用于将静态内容部署到GitHub Pages
名称：将静态内容部署到Pages：将静态内容部署到Pages

在：：
  # 在针对默认分支的推送触发# 在推送针对默认分支时运行
  推送::
    分支: ["main"]: ["main"]

  # 允许您从操作选项卡手动运行此工作流程# Allows you to run this workflow manually from the Actions tab
  工作流程_派发:

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
权限：:
  内容：阅读: read
  页数：写: write
  id-token: 写: write

# 仅允许一个并发部署，跳过在进行中的运行和最新排队之间的排队运行。
# 然而，请不要取消正在进行的运行，因为我们希望允许这些生产部署完成。
并发::
  组: "页面": "pages"
  取消正在进行中: 否: false

工作::
  # 单独部署作业，因为我们只是进行部署# Single deploy job since we're just deploying
  部署::
    环境::
      名称: github-pages: github-pages
      url: ${{ steps.deployment.outputs.page_url }}: ${{ steps.deployment.outputs.page_url }}
    运行于: ubuntu-latest: ubuntu-latest
    步骤：:
      - 名称: 结账name: Checkout
        用途：actions/checkout@v4: actions/checkout@v4
      - 名称: 设置页面name: Setup Pages
        用途：actions/configure-pages@v5: actions/configure-pages@v5
      - 名称：上传工件name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
