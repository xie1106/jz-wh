        function loadEmployeeList() {
            const savedList = localStorage.getItem('employee_list');
            const savedGroups = localStorage.getItem('employee_groups');
            if (savedList) {
                employeeList = JSON.parse(savedList);
            }
            if (savedGroups) {
                employeeGroups = JSON.parse(savedGroups);
            }
        }
        
        let currentYear = 0;
        let currentMonth = 0;
        let totalRestDays = 5;
        let currentSchedule = null;
        let scheduleLoaded = false;
        
        function init() {
            console.log('初始化页面...');
            loadEmployeeList();
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            
            // 不再自动增加月份，默认显示当前月份
            
            populateYearSelect();
            populateMonthSelect();
            document.getElementById('yearSelect').value = currentYear;
            document.getElementById('monthSelect').value = currentMonth;
            
            loadTotalRestDays();
            
            // 更新生成按钮状态
            updateGenerateButtonStatus();
            

            
            const key = getScheduleKey();
            const savedData = localStorage.getItem(key);
            if (savedData) {
                loadSchedule();
            } else {
                // 显示提示信息，告知用户可以选择月份查看历史记录
                document.getElementById('scheduleContainer').innerHTML = `

                    </div>
                `;
            }
            console.log('页面初始化完成！');
        }
        

        
        function getTotalRestDaysKey() {
            return 'total_rest_days_' + currentYear + '_' + currentMonth;
        }
        
        function loadTotalRestDays() {
            const key = getTotalRestDaysKey();
            const savedDays = localStorage.getItem(key);
            if (savedDays) {
                totalRestDays = parseInt(savedDays);
            } else {
                totalRestDays = 5;
            }
            document.getElementById('totalRestDaysDisplay').textContent = totalRestDays;
        }
        
        function isPastMonth() {
            const now = new Date();
            const lastDayOfMonth = new Date(currentYear, currentMonth, 0);
            return lastDayOfMonth < now;
        }
        
        function canEditSchedule() {
            // 检查是否为过去的月份
            const pastMonth = isPastMonth();
            if (pastMonth) {
                return false;
            }
            
            const now = new Date();
            const currentDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            // 计算目标月份的上个月的25号和最后一天
            const targetMonth = currentMonth;
            const targetYear = currentYear;
            const lastDayOfPreviousMonth = new Date(targetYear, targetMonth - 1, 0);
            const cutoffDate = new Date(targetYear, targetMonth - 1, 25);
            
            // 如果当前月份就是目标月份，不能编辑
            if (now.getFullYear() === targetYear && now.getMonth() + 1 === targetMonth) {
                return false;
            }
            
            // 如果当前日期在目标月份的上个月的25号之前，可以编辑（收集指定休息时间）
            // 如果当前日期在目标月份的上个月的26号到最后一天之间，可以编辑（排班确定时间）
            if (currentDate <= lastDayOfPreviousMonth) {
                return true;
            }
            
            return false;
        }
        
        function updateGenerateButtonStatus() {
            const generateButton = document.querySelector('.btn-primary');
            if (!generateButton) return;
            
            // 检查是否为过去的月份
            const pastMonth = isPastMonth();
            
            // 检查是否有确认过的排班记录
            const finalKey = 'final_confirmed_schedule_' + currentYear + '_' + currentMonth;
            const hasConfirmedSchedule = localStorage.getItem(finalKey) !== null;
            
            // 检查是否在排班确定时间内
            const now = new Date();
            const currentDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetMonth = currentMonth;
            const targetYear = currentYear;
            const lastDayOfPreviousMonth = new Date(targetYear, targetMonth - 1, 0);
            
            // 如果是过去的月份，禁用生成按钮
            if (pastMonth) {
                generateButton.disabled = true;
            } 
            // 如果当前日期在目标月份的上个月的最后一天之前，即使已经确认排班，也可以生成
            else if (currentDate <= lastDayOfPreviousMonth) {
                generateButton.disabled = false;
            }
            // 如果已经确认排班，禁用生成按钮
            else if (hasConfirmedSchedule) {
                generateButton.disabled = true;
            } else {
                generateButton.disabled = false;
            }
        }

        function getWeekdayName(day) {
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return weekdays[day];
        }
        
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        function generateSchedule() {
            console.log('开始生成排班表...');
            
            // 检查是否为过去的月份
            const now = new Date();
            const selectedDate = new Date(currentYear, currentMonth - 1, 1);
            const lastDayOfMonth = new Date(currentYear, currentMonth, 0);
            
            if (lastDayOfMonth < now) {
                alert('该月份已经过去，不能生成新的排班表，请查看历史记录！');
                return;
            }
            
            const key = getScheduleKey();
            const savedData = localStorage.getItem(key);
            if (savedData) {
                if (!confirm('已经有保存的排班表，重新生成会覆盖当前结果，确定要重新生成吗？')) {
                    return;
                }
            }
            
            const container = document.getElementById('scheduleContainer');
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const femaleEmployees = ['陈安然', '黄丽情', '崔斯欣'];
            
            // 初始化员工排班数据
            let employeeSchedule = {};
            let restDaysPerEmployee = {};
            
            employeeList.forEach(name => {
                const empKey = 'schedule_' + currentYear + '_' + currentMonth + '_' + name;
                const savedData = localStorage.getItem(empKey);
                let selectedDays = [];
                
                if (savedData) {
                    const data = JSON.parse(savedData);
                    selectedDays = data.selectedDays || [];
                }
                
                let autoRestDays = [];
                
                // 特殊处理谢焕君的休息安排（优先安排周日）
                if (name === '谢焕君') {
                    const sundayRestDays = [];
                    for (let day = 1; day <= daysInMonth; day++) {
                        const date = new Date(currentYear, currentMonth - 1, day);
                        if (date.getDay() === 0) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            sundayRestDays.push(dateStr);
                        }
                    }
                    
                    const maxAllowed = totalRestDays;
                    const selectedCount = selectedDays.length;
                    
                    if (selectedCount >= maxAllowed) {
                        autoRestDays = [];
                        selectedDays = selectedDays.slice(0, maxAllowed);
                    } else {
                        const remaining = maxAllowed - selectedCount;
                        autoRestDays = sundayRestDays.slice(0, remaining);
                    }
                } else {
                    // 对于其他员工，确保已选择的指定休天数被保留
                    const maxAllowed = totalRestDays;
                    const selectedCount = selectedDays.length;
                    
                    if (selectedCount > maxAllowed) {
                        // 如果选择的天数超过限制，只保留前maxAllowed天
                        selectedDays = selectedDays.slice(0, maxAllowed);
                    }
                    // 不需要为其他员工自动安排休息天数，后面的代码会处理
                }
                
                employeeSchedule[name] = {
                    selectedDays: selectedDays,
                    autoRestDays: autoRestDays
                };
                restDaysPerEmployee[name] = selectedDays.length + autoRestDays.length;
            });
            
            // 初始化每日休息统计数据
            let dailyRestCount = {};
            let dailyGroupRest = {};
            let dailyFemaleRest = {};
            let dailyOnDuty = {};
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                dailyRestCount[dateStr] = 0;
                dailyGroupRest[dateStr] = {};
                dailyFemaleRest[dateStr] = 0;
                dailyOnDuty[dateStr] = null;
                
                employeeList.forEach(name => {
                    if (employeeSchedule[name].selectedDays.includes(dateStr) || employeeSchedule[name].autoRestDays.includes(dateStr)) {
                        dailyRestCount[dateStr]++;
                        const group = employeeGroups[name] || '无组别';
                        if (!dailyGroupRest[dateStr][group]) {
                            dailyGroupRest[dateStr][group] = 0;
                        }
                        dailyGroupRest[dateStr][group]++;
                        
                        if (femaleEmployees.includes(name)) {
                            dailyFemaleRest[dateStr]++;
                        }
                    }
                });
            }
            
            // 获取需要安排额外休息的员工
            let shuffledEmployees = shuffleArray(employeeList.filter(name => {
                return restDaysPerEmployee[name] < totalRestDays;
            }));
            
            // 尝试生成排班表（最多10次尝试）
            for (let attempt = 0; attempt < 10; attempt++) {
                let allSatisfied = true;
                
                shuffledEmployees = shuffleArray(shuffledEmployees);
                
                shuffledEmployees.forEach(name => {
                    const remainingRest = totalRestDays - restDaysPerEmployee[name];
                    if (remainingRest <= 0) return;
                    
                    // 计算当前员工已安排的休息日期
                    const currentRestDays = [
                        ...employeeSchedule[name].selectedDays.map(d => parseInt(d.split('-')[2])),
                        ...employeeSchedule[name].autoRestDays.map(d => parseInt(d.split('-')[2]))
                    ].sort((a, b) => a - b);
                    
                    let availableDays = [];
                    
                    // 评估每个日期的适合度
                    for (let day = 1; day <= daysInMonth; day++) {
                        const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        const date = new Date(currentYear, currentMonth - 1, day);
                        const weekday = date.getDay();
                        const group = employeeGroups[name] || '无组别';
                        const isFemale = femaleEmployees.includes(name);
                        
                        // 跳过已安排休息的日期（包括指定休和自动安排的休息）
                        if (employeeSchedule[name].selectedDays.includes(dateStr) || 
                            employeeSchedule[name].autoRestDays.includes(dateStr)) {
                            continue;
                        }
                        
                        let priority = 0;
                        let valid = true;
                        
                        // 特殊规则：陈文童和付新远不能同一天休息
                        if (name === '陈文童' && 
                            (employeeSchedule['付新远'].selectedDays.includes(dateStr) || 
                             employeeSchedule['付新远'].autoRestDays.includes(dateStr))) {
                            valid = false;
                        }
                        if (name === '付新远' && 
                            (employeeSchedule['陈文童'].selectedDays.includes(dateStr) || 
                             employeeSchedule['陈文童'].autoRestDays.includes(dateStr))) {
                            valid = false;
                        }
                        
                        if (!valid) continue;
                        
                        // 计算前后日期的休息情况
                        const prevDay = day > 1 ? 
                            currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day - 1).padStart(2, '0') : null;
                        const nextDay = day < daysInMonth ? 
                            currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day + 1).padStart(2, '0') : null;
                        
                        // 避免连续休息
                        if ((prevDay && (employeeSchedule[name].selectedDays.includes(prevDay) || 
                                         employeeSchedule[name].autoRestDays.includes(prevDay))) ||
                            (nextDay && (employeeSchedule[name].selectedDays.includes(nextDay) || 
                                         employeeSchedule[name].autoRestDays.includes(nextDay)))) {
                            priority -= 50;
                        }
                        
                        // 计算与现有休息的距离
                        if (currentRestDays.length > 0) {
                            let minDistance = Infinity;
                            currentRestDays.forEach(restDay => {
                                const distance = Math.abs(day - restDay);
                                if (distance < minDistance) {
                                    minDistance = distance;
                                }
                            });
                            
                            // 避免过于接近现有休息
                            if (minDistance < 3) {
                                priority -= (3 - minDistance) * 30;
                            } else {
                                // 增加随机性，避免休息集中在月中
                                priority += Math.random() * 20;
                            }
                        } else {
                            // 没有休息安排时，优先安排周日，但增加随机性
                            if (weekday === 0) {
                                priority += 30 + Math.random() * 20;
                            } else {
                                // 增加随机性，确保休息分布均匀
                                priority += Math.random() * 15;
                            }
                        }
                        
                        // 确保休息均匀分布在整个月
                        // 计算日期在月中的位置（0-1之间）
                        const monthPosition = (day - 1) / (daysInMonth - 1);
                        // 避免休息集中在月中，增加月初和月末的优先级
                        if (monthPosition < 0.2 || monthPosition > 0.8) {
                            priority += 20;
                        } else if (monthPosition >= 0.4 && monthPosition <= 0.6) {
                            // 降低月中休息的优先级
                            priority -= 10;
                        }
                        
                        // 根据星期几调整优先级
                        if (weekday === 0) {
                            if (dailyRestCount[dateStr] < 7) {
                                priority += 100 - dailyRestCount[dateStr];
                            }
                        } else if (weekday === 1) {
                            // 周一尽量不安排休息，降低优先级
                            priority -= 100;
                        } else {
                            if (dailyRestCount[dateStr] < 2) {
                                priority += 50 - dailyRestCount[dateStr];
                            }
                        }
                        
                        // 避免同一组过多人休息
                        if (dailyGroupRest[dateStr][group] && dailyGroupRest[dateStr][group] >= 1) {
                            priority -= 30;
                        }
                        
                        // 避免同一天过多女性员工休息
                        if (isFemale && dailyFemaleRest[dateStr] >= 1) {
                            priority -= 40;
                        }
                        
                        if (priority > -100) {
                            availableDays.push({ dateStr, priority, day, weekday });
                        }
                    }
                    
                    // 选择最合适的日期安排休息
                    if (availableDays.length > 0) {
                        availableDays.sort((a, b) => b.priority - a.priority);
                        
                        const maxPriority = availableDays[0].priority;
                        const topDays = availableDays.filter(d => d.priority >= maxPriority - 10);
                        const selectedDay = topDays[Math.floor(Math.random() * topDays.length)];
                        
                        // 更新排班数据
                        employeeSchedule[name].autoRestDays.push(selectedDay.dateStr);
                        dailyRestCount[selectedDay.dateStr]++;
                        restDaysPerEmployee[name]++;
                        
                        const group = employeeGroups[name] || '无组别';
                        if (!dailyGroupRest[selectedDay.dateStr][group]) {
                            dailyGroupRest[selectedDay.dateStr][group] = 0;
                        }
                        dailyGroupRest[selectedDay.dateStr][group]++;
                        
                        if (femaleEmployees.includes(name)) {
                            dailyFemaleRest[selectedDay.dateStr]++;
                        }
                    } else {
                        allSatisfied = false;
                    }
                });
                
                // 检查是否所有员工都已安排足够的休息
                const allComplete = employeeList.every(name => restDaysPerEmployee[name] >= totalRestDays);
                if (allComplete) break;
            }
            
            // 安排值班（连续值班，休息的人当天不安排值班，值班中间不穿插休息）
            const onDutyExcluded = ['谢焕君', '付新远', '陈文童', '陈安然', '黄丽情', '崔斯欣'];
            // 常规值班候选人（不包括林镇兴，且必须有组别）
            const regularOnDutyCandidates = employeeList.filter(name => 
                !onDutyExcluded.includes(name) && 
                name !== '林镇兴' && 
                employeeGroups[name] !== undefined && 
                employeeGroups[name] !== ''
            );
            const regularCandidateCount = regularOnDutyCandidates.length;
            
            // 计算每个人的值班天数
            const dutyDaysPerPerson = {};
            let extraDays = 0;
            
            if (regularCandidateCount > 0) {
                // 计算基础值班天数
                const baseDutyDays = Math.floor(daysInMonth / regularCandidateCount);
                extraDays = daysInMonth % regularCandidateCount;
                
                // 为常规值班人员分配基础天数
                regularOnDutyCandidates.forEach(candidate => {
                    dutyDaysPerPerson[candidate] = baseDutyDays;
                });
                
                // 确保每个人至少有1天值班
                regularOnDutyCandidates.forEach(candidate => {
                    if (dutyDaysPerPerson[candidate] < 1) {
                        dutyDaysPerPerson[candidate] = 1;
                    }
                });
            }
            
            // 所有值班候选人（包括林镇兴，用于填充剩余天数，且必须有组别）
            const allOnDutyCandidates = employeeList.filter(name => 
                !onDutyExcluded.includes(name) && 
                employeeGroups[name] !== undefined && 
                employeeGroups[name] !== ''
            );
            
            if (regularCandidateCount > 0) {
                // 随机打乱候选人顺序，增加公平性
                const shuffledCandidates = shuffleArray([...regularOnDutyCandidates]);
                
                // 跟踪每个人已经安排的值班天数
                const assignedDutyDays = {};
                regularOnDutyCandidates.forEach(candidate => {
                    assignedDutyDays[candidate] = 0;
                });
                
                // 为每个常规候选人找到连续的值班时间段
                shuffledCandidates.forEach(candidate => {
                    const dutyDays = dutyDaysPerPerson[candidate];
                    
                    // 找到所有可用的连续工作段
                    const allWorkStreaks = [];
                    
                    // 遍历所有可能的连续工作段
                    for (let startDay = 1; startDay <= daysInMonth; startDay++) {
                        let currentStreak = [];
                        for (let day = startDay; day <= daysInMonth; day++) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            const isResting = employeeSchedule[candidate].selectedDays.includes(dateStr) || 
                                             employeeSchedule[candidate].autoRestDays.includes(dateStr);
                            
                            if (!isResting && !dailyOnDuty[dateStr]) {
                                currentStreak.push(day);
                            } else {
                                break;
                            }
                        }
                        
                        if (currentStreak.length >= dutyDays) {
                            allWorkStreaks.push(currentStreak);
                        }
                    }
                    
                    // 如果找到足够长的连续段，选择一个来安排值班
                    if (allWorkStreaks.length > 0) {
                        // 选择第一个足够长的连续段
                        const selectedStreak = allWorkStreaks[0];
                        // 安排连续的值班天数
                        for (let i = 0; i < dutyDays; i++) {
                            const day = selectedStreak[i];
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            dailyOnDuty[dateStr] = candidate;
                            assignedDutyDays[candidate]++;
                        }
                    } else {
                        // 如果没有找到足够长的连续段，找到最长的连续段
                        const allPossibleStreaks = [];
                        for (let startDay = 1; startDay <= daysInMonth; startDay++) {
                            let currentStreak = [];
                            for (let day = startDay; day <= daysInMonth; day++) {
                                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                const isResting = employeeSchedule[candidate].selectedDays.includes(dateStr) || 
                                                 employeeSchedule[candidate].autoRestDays.includes(dateStr);
                                
                                if (!isResting && !dailyOnDuty[dateStr]) {
                                    currentStreak.push(day);
                                } else {
                                    break;
                                }
                            }
                            
                            if (currentStreak.length > 0) {
                                allPossibleStreaks.push(currentStreak);
                            }
                        }
                        
                        if (allPossibleStreaks.length > 0) {
                            // 按长度排序
                            allPossibleStreaks.sort((a, b) => b.length - a.length);
                            
                            // 安排最长的连续段
                            const longestStreak = allPossibleStreaks[0];
                            for (const day of longestStreak) {
                                if (assignedDutyDays[candidate] >= dutyDays) break;
                                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                dailyOnDuty[dateStr] = candidate;
                                assignedDutyDays[candidate]++;
                            }
                            
                            // 安排剩余的值班天数
                            let remaining = dutyDays - assignedDutyDays[candidate];
                            if (remaining > 0) {
                                // 找到其他可用的连续段
                                for (const streak of allPossibleStreaks.slice(1)) {
                                    if (remaining <= 0) break;
                                    for (const day of streak) {
                                        if (remaining <= 0) break;
                                        const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                        dailyOnDuty[dateStr] = candidate;
                                        assignedDutyDays[candidate]++;
                                        remaining--;
                                    }
                                }
                            }
                        }
                    }
                });
                
                // 收集需要林镇兴值班的日期
                const linOnDutyDays = [];
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    if (!dailyOnDuty[dateStr]) {
                        // 首先尝试安排给值班天数不足的常规候选人
                        const availableRegularCandidates = regularOnDutyCandidates.filter(candidate => {
                            const isResting = employeeSchedule[candidate].selectedDays.includes(dateStr) || 
                                             employeeSchedule[candidate].autoRestDays.includes(dateStr);
                            return !isResting && assignedDutyDays[candidate] < dutyDaysPerPerson[candidate];
                        });
                        
                        if (availableRegularCandidates.length > 0) {
                            // 按值班天数从少到多排序
                            availableRegularCandidates.sort((a, b) => assignedDutyDays[a] - assignedDutyDays[b]);
                            // 选择值班天数最少的人
                            const selectedCandidate = availableRegularCandidates[0];
                            dailyOnDuty[dateStr] = selectedCandidate;
                            assignedDutyDays[selectedCandidate]++;
                        } else {
                            // 收集需要林镇兴值班的日期
                            linOnDutyDays.push(day);
                        }
                    }
                }
                
                // 为林镇兴安排连续的值班日期
                if (linOnDutyDays.length > 0) {
                    // 找到林镇兴的所有可用连续工作段
                    const linWorkStreaks = [];
                    
                    // 遍历所有可能的连续工作段
                    for (let startDay = 1; startDay <= daysInMonth; startDay++) {
                        let currentStreak = [];
                        for (let day = startDay; day <= daysInMonth; day++) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            const isResting = employeeSchedule['林镇兴'] && 
                                             (employeeSchedule['林镇兴'].selectedDays.includes(dateStr) || 
                                              employeeSchedule['林镇兴'].autoRestDays.includes(dateStr));
                            
                            if (!isResting && !dailyOnDuty[dateStr]) {
                                currentStreak.push(day);
                            } else {
                                break;
                            }
                        }
                        
                        if (currentStreak.length > 0) {
                            linWorkStreaks.push(currentStreak);
                        }
                    }
                    
                    // 按长度排序，优先选择长的连续段
                    linWorkStreaks.sort((a, b) => b.length - a.length);
                    
                    // 安排林镇兴的值班日期
                    let assignedDays = 0;
                    for (const streak of linWorkStreaks) {
                        if (assignedDays >= linOnDutyDays.length) break;
                        
                        for (const day of streak) {
                            if (assignedDays >= linOnDutyDays.length) break;
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            dailyOnDuty[dateStr] = '林镇兴';
                            assignedDays++;
                        }
                    }
                    
                    // 如果还有未安排的日期，随机安排
                    if (assignedDays < linOnDutyDays.length) {
                        for (const day of linOnDutyDays) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            if (!dailyOnDuty[dateStr]) {
                                dailyOnDuty[dateStr] = '林镇兴';
                            }
                        }
                    }
                }
                
                // 最后验证所有常规候选人都有值班天数
                regularOnDutyCandidates.forEach(candidate => {
                    // 确保每个人都有值班天数
                    if (assignedDutyDays[candidate] === 0) {
                        // 为没有值班的人找到一个连续的工作段
                        let assigned = false;
                        
                        // 找到该候选人的所有可用连续工作段
                        const candidateWorkStreaks = [];
                        for (let startDay = 1; startDay <= daysInMonth; startDay++) {
                            let currentStreak = [];
                            for (let day = startDay; day <= daysInMonth; day++) {
                                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                const isResting = employeeSchedule[candidate].selectedDays.includes(dateStr) || 
                                                 employeeSchedule[candidate].autoRestDays.includes(dateStr);
                                
                                if (!isResting) {
                                    currentStreak.push(day);
                                } else {
                                    break;
                                }
                            }
                            
                            if (currentStreak.length > 0) {
                                candidateWorkStreaks.push(currentStreak);
                            }
                        }
                        
                        // 按长度排序，优先选择长的连续段
                        candidateWorkStreaks.sort((a, b) => b.length - a.length);
                        
                        // 尝试在连续段中安排值班
                        for (const streak of candidateWorkStreaks) {
                            // 检查连续段中是否有可以替换的日期
                            for (const day of streak) {
                                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                const currentOnDuty = dailyOnDuty[dateStr];
                                
                                if (currentOnDuty === '林镇兴' || 
                                    (currentOnDuty && assignedDutyDays[currentOnDuty] > dutyDaysPerPerson[currentOnDuty])) {
                                    // 替换当天的值班人员
                                    dailyOnDuty[dateStr] = candidate;
                                    assignedDutyDays[candidate]++;
                                    if (currentOnDuty && currentOnDuty !== '林镇兴') {
                                        assignedDutyDays[currentOnDuty]--;
                                    }
                                    assigned = true;
                                    
                                    // 尝试在连续段中安排更多值班天数
                                    let remainingDays = dutyDaysPerPerson[candidate] - 1;
                                    for (let i = streak.indexOf(day) + 1; i < streak.length && remainingDays > 0; i++) {
                                        const nextDay = streak[i];
                                        const nextDateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(nextDay).padStart(2, '0');
                                        const nextCurrentOnDuty = dailyOnDuty[nextDateStr];
                                        
                                        if (nextCurrentOnDuty === '林镇兴' || 
                                            (nextCurrentOnDuty && assignedDutyDays[nextCurrentOnDuty] > dutyDaysPerPerson[nextCurrentOnDuty])) {
                                            dailyOnDuty[nextDateStr] = candidate;
                                            assignedDutyDays[candidate]++;
                                            if (nextCurrentOnDuty && nextCurrentOnDuty !== '林镇兴') {
                                                assignedDutyDays[nextCurrentOnDuty]--;
                                            }
                                            remainingDays--;
                                        } else {
                                            break;
                                        }
                                    }
                                    break;
                                }
                            }
                            if (assigned) break;
                        }
                        
                        // 如果还是没有找到合适的日期，随机替换一天
                        if (!assigned) {
                            const randomDay = Math.floor(Math.random() * daysInMonth) + 1;
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(randomDay).padStart(2, '0');
                            const currentOnDuty = dailyOnDuty[dateStr];
                            if (currentOnDuty && currentOnDuty !== '林镇兴') {
                                assignedDutyDays[currentOnDuty]--;
                            }
                            dailyOnDuty[dateStr] = candidate;
                            assignedDutyDays[candidate]++;
                        }
                    }
                    
                    // 确保每个人的值班天数不超过分配的天数
                    while (assignedDutyDays[candidate] > dutyDaysPerPerson[candidate]) {
                        // 找到该候选人值班的连续段
                        const candidateDutyStreaks = [];
                        let currentStreak = [];
                        
                        for (let day = 1; day <= daysInMonth; day++) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            if (dailyOnDuty[dateStr] === candidate) {
                                currentStreak.push(day);
                            } else if (currentStreak.length > 0) {
                                candidateDutyStreaks.push(currentStreak);
                                currentStreak = [];
                            }
                        }
                        if (currentStreak.length > 0) {
                            candidateDutyStreaks.push(currentStreak);
                        }
                        
                        // 按长度排序，优先选择短的连续段
                        candidateDutyStreaks.sort((a, b) => a.length - b.length);
                        
                        // 尝试从短的连续段中调整值班天数
                        for (const streak of candidateDutyStreaks) {
                            for (const day of streak) {
                                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                                
                                // 尝试安排给林镇兴
                                const isLinResting = employeeSchedule['林镇兴'] && 
                                                   (employeeSchedule['林镇兴'].selectedDays.includes(dateStr) || 
                                                    employeeSchedule['林镇兴'].autoRestDays.includes(dateStr));
                                
                                if (!isLinResting) {
                                    // 安排给林镇兴
                                    dailyOnDuty[dateStr] = '林镇兴';
                                    assignedDutyDays[candidate]--;
                                    break;
                                } else {
                                    // 找到当天不休息且值班天数不足的其他常规候选人
                                    const availableCandidates = regularOnDutyCandidates.filter(c => {
                                        const isResting = employeeSchedule[c].selectedDays.includes(dateStr) || 
                                                         employeeSchedule[c].autoRestDays.includes(dateStr);
                                        return c !== candidate && !isResting && assignedDutyDays[c] < dutyDaysPerPerson[c];
                                    });
                                    
                                    if (availableCandidates.length > 0) {
                                        // 按值班天数从少到多排序
                                        availableCandidates.sort((a, b) => assignedDutyDays[a] - assignedDutyDays[b]);
                                        // 选择值班天数最少的人
                                        const selectedCandidate = availableCandidates[0];
                                        dailyOnDuty[dateStr] = selectedCandidate;
                                        assignedDutyDays[candidate]--;
                                        assignedDutyDays[selectedCandidate]++;
                                        break;
                                    }
                                }
                            }
                            if (assignedDutyDays[candidate] <= dutyDaysPerPerson[candidate]) break;
                        }
                    }
                });
                
                // 重新为林镇兴安排连续的值班日期
                const linDutyDays = [];
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    if (dailyOnDuty[dateStr] === '林镇兴') {
                        linDutyDays.push(day);
                    }
                }
                
                // 清除林镇兴的值班日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    if (dailyOnDuty[dateStr] === '林镇兴') {
                        delete dailyOnDuty[dateStr];
                    }
                }
                
                // 重新为林镇兴安排连续的值班日期
                if (linDutyDays.length > 0) {
                    // 找到林镇兴的所有可用连续工作段
                    const linWorkStreaks = [];
                    
                    // 遍历所有可能的连续工作段
                    for (let startDay = 1; startDay <= daysInMonth; startDay++) {
                        let currentStreak = [];
                        for (let day = startDay; day <= daysInMonth; day++) {
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            const isResting = employeeSchedule['林镇兴'] && 
                                             (employeeSchedule['林镇兴'].selectedDays.includes(dateStr) || 
                                              employeeSchedule['林镇兴'].autoRestDays.includes(dateStr));
                            
                            if (!isResting && !dailyOnDuty[dateStr]) {
                                currentStreak.push(day);
                            } else {
                                break;
                            }
                        }
                        
                        if (currentStreak.length > 0) {
                            linWorkStreaks.push(currentStreak);
                        }
                    }
                    
                    // 按长度排序，优先选择长的连续段
                    linWorkStreaks.sort((a, b) => b.length - a.length);
                    
                    // 安排林镇兴的值班日期
                    let assignedDays = 0;
                    for (const streak of linWorkStreaks) {
                        if (assignedDays >= linDutyDays.length) break;
                        
                        for (const day of streak) {
                            if (assignedDays >= linDutyDays.length) break;
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            dailyOnDuty[dateStr] = '林镇兴';
                            assignedDays++;
                        }
                    }
                    
                    // 如果还有未安排的日期，随机安排
                    if (assignedDays < linDutyDays.length) {
                        for (let i = assignedDays; i < linDutyDays.length; i++) {
                            const day = linDutyDays[i];
                            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                            if (!dailyOnDuty[dateStr]) {
                                dailyOnDuty[dateStr] = '林镇兴';
                            }
                        }
                    }
                }
            }
            
            let html = `
                <table class="fixed-table">
                    <thead>
                        <tr>
                            <th class="col-small header-cell" style="background: #ffffff;">上班</th>
                            <th class="col-small header-cell rest" style="background: #FFFF00;">休息</th>
                            <th class="col-small header-cell assigned" style="background: #800080; color: white;">指定休</th>
                            <th class="col-small header-cell on-duty" style="background: #FF0000; color: white;">上&amp;值</th>
                            <th class="col-small header-cell compensatory" style="background: #999999; color: white;">调休</th>
                            <th colspan="26" style="text-align: center; font-size: 24px;">${currentYear}年 ${currentMonth}月份云仓排班表</th>
                            <th class="col-small header-cell marriage" style="background: #FF99FF;">婚假</th>
                            <th class="col-small header-cell qc" style="background: #FFCC99;">产检</th>
                            <th class="col-small header-cell" style="background: #ADD8E6;">产假</th>
                            <th class="col-small header-cell annual" style="background: #66CCFF;">年假</th>
                        </tr>
                        <tr>
                            <th class="col-small">序号</th>
                            <th class="col-name">姓名</th>
                            <th class="col-group">组别</th>
                            <th class="col-days">实休<br>天数</th>
            `;
            
            for (let day = 1; day <= 31; day++) {
                const date = new Date(currentYear, currentMonth - 1, day);
                const weekday = date.getDay();
                const weekdays = ['', '一', '二', '三', '四', '五', '六', '日'];
                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                const isHoliday = holidays[dateStr];
                let style = '';
                if (isHoliday) {
                    style = 'background: #FF0000; color: white;';
                }
                if (day > daysInMonth) {
                    style += 'background: #f0f0f0; color: #ccc;';
                }
                html += `<th class="col-small" style="${style}">${day}<br>${weekdays[weekday]}</th>`;
            }
            
            html += `
                        </tr>
                        <tr>
                            <td colspan="4" style="font-weight: bold; color: green; font-size: 14px;">上班人数：</td>
            `;
            
            for (let day = 1; day <= 31; day++) {
                const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                const workingCount = day > daysInMonth ? '' : (employeeList.length - (dailyRestCount[dateStr] || 0));
                let style = day > daysInMonth ? 'background: #f0f0f0; color: #ccc;' : '';
                html += `<td style="font-weight: bold; color: green;" id="working-count-${day}">${workingCount}</td>`;
            }
            
            html += `
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            employeeList.forEach((name, index) => {
                let rowStyle = '';
                if (index % 2 === 1) {
                    rowStyle = 'background: #FFFF00;';
                }
                
                const actualRestDays = employeeSchedule[name].selectedDays.length + employeeSchedule[name].autoRestDays.length;
                html += `
                    <tr style="${rowStyle}">
                        <td>${index + 1}</td>
                        <td style="font-weight: bold; color: black;">${name}</td>
                        <td>${employeeGroups[name] || '无组别'}</td>
                        <td>${actualRestDays}</td>
                `;
                
                for (let day = 1; day <= 31; day++) {
                    const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    
                    let cellClass = '';
                    let cellText = '上班';
                    let cellType = 'work';
                    
                    if (day > daysInMonth) {
                        cellText = '';
                        cellClass = 'empty';
                    } else if (dailyOnDuty && dailyOnDuty[dateStr] === name) {
                        cellClass = 'on-duty';
                        cellText = '上&值';
                        cellType = 'on-duty';
                    } else if (employeeSchedule[name].selectedDays.includes(dateStr)) {
                        cellClass = 'assigned';
                        cellText = '指定休';
                        cellType = 'assigned';
                    } else if (employeeSchedule[name].autoRestDays.includes(dateStr)) {
                        cellClass = 'rest';
                        cellText = '休息';
                        cellType = 'rest';
                    }
                    
                    let style = day > daysInMonth ? 'background: #f0f0f0; color: #ccc; cursor: default;' : '';
                    html += `<td class="editable-cell ${cellClass}" data-name="${name}" data-day="${day}" data-type="${cellType}" style="${style}">${cellText}</td>`;
                }
                
                html += `
                    </tr>
                `;
            });
            
            html += `

                    <p><b>1、每月25号前会敲定下个月的休息时间，如果没有回复的默认没有指定休息，自己自觉点不用过来寻求调整，一律拒绝！</b></p>
                    <p><b>2、确定后的排班不作修改，临时需要休息的，请假/年假！</b></p>
                </div>
            `;
            
            currentSchedule = {
                employeeSchedule: employeeSchedule,
                dailyRestCount: dailyRestCount,
                dailyOnDuty: dailyOnDuty,
                daysInMonth: daysInMonth
            };
            scheduleLoaded = true;
            
            container.innerHTML = html;
            addClickHandlers();
            
            localStorage.setItem(key, JSON.stringify(currentSchedule));
            console.log('排班表生成完成！');
        }

            if (!savedData) {
                return;

            currentSchedule = JSON.parse(savedData);
            scheduleLoaded = true;
            
            // 检查是否为过去的月份
            const pastMonth = isPastMonth();
            // 检查是否为已确认的排班
            const finalKey = 'final_confirmed_schedule_' + currentYear + '_' + currentMonth;
            const hasConfirmedSchedule = localStorage.getItem(finalKey) !== null;
            
            renderEditableSchedule(pastMonth || hasConfirmedSchedule);
        }

                { type: 'annual', text: '年假', class: 'annual' },
                { type: 'marriage', text: '婚假', class: 'marriage' },
                { type: 'qc', text: '产检', class: 'qc' },
                { type: 'compensatory', text: '调休', class: 'compensatory' },
                { type: 'maternity', text: '产假', class: 'maternity' }
            ];
            
            options.forEach(opt => {
                const item = document.createElement('div');
                item.className = 'dropdown-item ' + opt.class;
                item.textContent = opt.text;
                item.dataset.type = opt.type;
                item.onclick = (e) => {
                    e.stopPropagation();
                    selectOption(opt.type, opt.text, opt.class);
                };
                dropdownMenu.appendChild(item);
            });
            
            document.body.appendChild(dropdownMenu);
        }
        
        function closeDropdown(e) {
            if (dropdownMenu && !dropdownMenu.contains(e?.target) && (!currentEditingCell || e?.target !== currentEditingCell)) {
                dropdownMenu.classList.remove('show');
                document.querySelectorAll('.editable-cell.active').forEach(c => c.classList.remove('active'));
                currentEditingCell = null;
                document.removeEventListener('click', closeDropdown);
            }
        }
        
        function toggleCell(cell) {
            if (!currentSchedule) return;
            
            document.querySelectorAll('.editable-cell.active').forEach(c => c.classList.remove('active'));
            
            currentEditingCell = cell;
            cell.classList.add('active');
            
            if (!dropdownMenu) {
                createDropdownMenu();
            }
            
            const rect = cell.getBoundingClientRect();
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // 计算下拉菜单的位置，确保在屏幕内显示
            let top = rect.bottom + 5;
            let left = rect.left;
            
            // 检查右侧空间是否足够
            if (left + 160 > windowWidth) {
                left = windowWidth - 160;
            }
            
            // 检查底部空间是否足够
            if (top + 200 > windowHeight) {
                top = rect.top - 200;
                if (top < 0) top = 10;
            }
            
            dropdownMenu.style.top = top + 'px';
            dropdownMenu.style.left = left + 'px';
            dropdownMenu.style.minWidth = '160px';
            dropdownMenu.classList.add('show');
            
            // 确保添加点击事件监听器
            document.removeEventListener('click', closeDropdown);
            document.addEventListener('click', closeDropdown);
        }
        
        function selectOption(type, text, className) {
            if (!currentEditingCell || !currentSchedule) return;
            
            const name = currentEditingCell.getAttribute('data-name');
            const day = parseInt(currentEditingCell.getAttribute('data-day'));
            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            const { employeeSchedule, dailyRestCount } = currentSchedule;
            
            const oldType = currentEditingCell.getAttribute('data-type');
            
            const selectedIndex = employeeSchedule[name].selectedDays.indexOf(dateStr);
            const autoIndex = employeeSchedule[name].autoRestDays.indexOf(dateStr);
            
            if (selectedIndex > -1) {
                employeeSchedule[name].selectedDays.splice(selectedIndex, 1);
                dailyRestCount[dateStr]--;
            }
            if (autoIndex > -1) {
                employeeSchedule[name].autoRestDays.splice(autoIndex, 1);
                dailyRestCount[dateStr]--;
            }
            
            if (type === 'assigned') {
                employeeSchedule[name].selectedDays.push(dateStr);
                dailyRestCount[dateStr]++;
            } else if (type === 'rest') {
                employeeSchedule[name].autoRestDays.push(dateStr);
                dailyRestCount[dateStr]++;
            } else if (type === 'on-duty' || type === 'vacation' || type === 'annual' || type === 'marriage' || type === 'qc') {
                dailyRestCount[dateStr]++;
            }
            
            currentEditingCell.className = 'editable-cell ' + className;
            currentEditingCell.textContent = text;
            currentEditingCell.setAttribute('data-type', type);
            
            const workingCountCell = document.getElementById('working-count-' + day);
            if (workingCountCell) {
                const workingCount = employeeList.length - dailyRestCount[dateStr];
                workingCountCell.textContent = workingCount;
            }
            
            const actualRestDays = employeeSchedule[name].selectedDays.length + employeeSchedule[name].autoRestDays.length;
            const row = currentEditingCell.closest('tr');
            if (row) {
                const restDaysCell = row.querySelector('td:nth-child(4)');
                if (restDaysCell) {
                    restDaysCell.textContent = actualRestDays;
                }
            }
            
            currentEditingCell.classList.remove('active');
            dropdownMenu.classList.remove('show');
            document.removeEventListener('click', closeDropdown);
            
            const key = getScheduleKey();
            localStorage.setItem(key, JSON.stringify(currentSchedule));
        }
        
        function exportExcel() {
            const container = document.getElementById('scheduleContainer');
            if (container.querySelector('table') === null) {
                alert('请先生成排班表！');
                return;
            }
            
            const table = container.querySelector('table');
            
            let htmlContent = `<!DOCTYPE html>

            const blob = new Blob([htmlContent], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentYear + '年' + currentMonth + '月份云仓排班表.xls';

        function confirmSchedule() {
            const container = document.getElementById('scheduleContainer');
            if (container.querySelector('table') === null) {
                alert('请先生成排班表！');
                return;
            }
            
            if (!currentSchedule) {
                alert('请先生成排班表！');
                return;
            }
            
            if (confirm('确定要最终确认排班表吗？确认后将无法再修改！')) {
                // 保存最终版本的排班表
                const key = getScheduleKey();
                const finalKey = 'final_confirmed_schedule_' + currentYear + '_' + currentMonth;
                
                // 保存最终确认的排班表
                localStorage.setItem(finalKey, JSON.stringify(currentSchedule));
                
                // 禁用编辑功能
                const editableCells = document.querySelectorAll('.editable-cell');
                editableCells.forEach(cell => {
                    cell.style.cursor = 'default';
                    cell.style.pointerEvents = 'none';
                    cell.classList.remove('editable-cell');
                });
                
                // 更新生成按钮状态，禁用一键生成排班表
                updateGenerateButtonStatus();
                
                // 显示确认信息
                alert('排班表已成功确认！');
                
                // 可以在这里添加其他确认后的操作，比如发送通知等
            }
        }
        
        function confirmBackHome() {
            // 检查是否有排班表数据
            if (currentSchedule) {
                const key = getScheduleKey();
                const savedData = localStorage.getItem(key);
                
                // 检查是否有未保存的修改
                if (savedData) {
                    const savedSchedule = JSON.parse(savedData);
                    // 简单比较是否有修改
                    if (JSON.stringify(currentSchedule) !== JSON.stringify(savedSchedule)) {
                        return confirm('您有未保存的排班表修改，确定要返回首页吗？');
                    }
                } else {
                    // 有排班表但未保存
                    return confirm('您有未保存的排班表，确定要返回首页吗？');
                }
            }
            return true;
        }
        
        init();
    </script>
